<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Authenticating with GitHub…</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0F172A;
        color: #CBD5E1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .card {
        background: #1E293B;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 40px 48px;
        max-width: 420px;
        width: 90%;
      }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid #334155;
        border-top-color: #38BDF8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 24px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 18px; font-weight: 600; color: #F1F5F9; margin-bottom: 8px; }
      p  { font-size: 14px; color: #94A3B8; line-height: 1.6; }
      .error-card { display: none; }
      .error-card h1 { color: #F87171; }
      .error-msg {
        font-size: 12px; color: #94A3B8; margin-top: 12px;
        font-family: monospace; background: #0F172A;
        padding: 8px 12px; border-radius: 6px; word-break: break-all;
      }
      .hint { font-size: 12px; color: #64748B; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div class="card" id="loading-card">
      <div class="spinner"></div>
      <h1>Authenticating…</h1>
      <p>Completing GitHub sign-in. This window will close automatically.</p>
    </div>
    <div class="card error-card" id="error-card">
      <h1>Authentication Failed</h1>
      <p>Could not sign in with GitHub.</p>
      <div class="error-msg" id="error-msg"></div>
      <p class="hint">This window will close in 5 seconds.</p>
    </div>

    <script>
      function notifyAndClose(type, payload) {
        // Build the message string in the format Decap CMS expects
        var message = 'authorization:github:' + type + ':' + JSON.stringify(payload);

        var sent = false;

        // Strategy 1: BroadcastChannel (most reliable — works even if opener is null)
        try {
          var bc = new BroadcastChannel('decap-cms-auth');
          bc.postMessage({ type: type, payload: payload, message: message });
          bc.close();
          sent = true;
        } catch (e) {
          console.warn('[callback] BroadcastChannel failed:', e);
        }

        // Strategy 2: window.opener.postMessage (classic approach)
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage(message, '*');
            sent = true;
          }
        } catch (e) {
          console.warn('[callback] window.opener.postMessage failed:', e);
        }

        if (!sent) {
          console.error('[callback] Could not reach parent window via any method');
        }

        // Give a short pause so the BroadcastChannel message is received before closing
        setTimeout(function() { window.close(); }, 800);
      }

      function showError(msg) {
        document.getElementById('loading-card').style.display = 'none';
        var card = document.getElementById('error-card');
        card.style.display = 'block';
        document.getElementById('error-msg').textContent = msg;
        notifyAndClose('error', { message: msg });
      }

      (function() {
        var params = new URLSearchParams(window.location.search);
        var code  = params.get('code');
        var state = params.get('state');

        if (!code) {
          showError('No authorization code received from GitHub. Check that the GitHub OAuth App callback URL is set to: ' + window.location.origin + '/admin/callback.html');
          return;
        }

        // Exchange the code for a token via our secure server endpoint
        fetch('/api/auth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, state: state })
        })
        .then(function(res) {
          return res.json().then(function(data) {
            return { status: res.status, data: data };
          });
        })
        .then(function(result) {
          if (result.data.error) {
            showError('GitHub error: ' + result.data.error);
            return;
          }
          if (!result.data.token) {
            showError('Server returned no token. HTTP ' + result.status);
            return;
          }
          // Success — send token back to the CMS
          notifyAndClose('success', { token: result.data.token, provider: 'github' });
        })
        .catch(function(err) {
          showError('Network error: ' + (err && err.message ? err.message : String(err)));
        });
      })();
    </script>
  </body>
</html>
